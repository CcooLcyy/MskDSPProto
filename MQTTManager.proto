syntax = "proto3";

package MQTTManagerProto;

// MQTTManager 服务：提供通用 MQTT 连接与请求-响应能力，消息负载透传。
service MQTTManagerService {
  // 发布消息：业务模块调用，直接发布 payload 到指定主题。
  // 语义：产生外发报文副作用；幂等性取决于业务与 MQTT 代理服务器；非流式。
  // 常见错误：INVALID_ARGUMENT（连接参数/主题/负载为空）、FAILED_PRECONDITION（连接失败）、
  // INTERNAL（发布失败）。
  rpc Publish(PublishRequest) returns (PublishResponse);

  // 订阅消息：业务模块调用，建立服务端流，按主题过滤推送收到的 MQTT 原始消息。
  // 语义：服务端流；客户端取消或服务端异常时结束；无落盘副作用。
  // 常见错误：INVALID_ARGUMENT（连接参数为空或主题列表为空）、FAILED_PRECONDITION（连接失败）、
  // INTERNAL（订阅失败）。
  rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse);

  // 请求并等待响应：业务模块调用，MQTTManager 透传 JSON payload 并按字段匹配响应。
  // 语义：产生外发报文副作用；内部维护超时与重试；非流式。
  // 常见错误：INVALID_ARGUMENT（连接参数/主题/负载为空、JSON 无效或匹配字段无效）、
  // ALREADY_EXISTS（匹配条件冲突）、DEADLINE_EXCEEDED（等待超时）、
  // FAILED_PRECONDITION（连接失败）、INTERNAL（发布/订阅失败）。
  rpc RequestAndWait(RequestAndWaitRequest) returns (RequestAndWaitResponse);
}

// 连接参数：由业务模块透传提供，MQTTManager 按 host:port + client_id 维持连接。
// 若同一 host:port + client_id 下其余连接参数不一致，则返回连接参数冲突错误。
message ConnectionInfo {
  string host = 1;
  uint32 port = 2;
  string client_id = 3;
  string username = 4;
  string password = 5;
  uint32 keepalive_sec = 6;
  bool clean_session = 7;
  uint32 connect_timeout_ms = 8;
}

// 发布请求。
message PublishRequest {
  ConnectionInfo connection = 1;
  string topic = 2;
  uint32 qos = 3;
  bool retain = 4;
  bytes payload = 5;
}

// 发布响应。
message PublishResponse {
  bool ok = 1;
  string message = 2;
}

// 订阅主题过滤条件。
message TopicFilter {
  string topic = 1;
  uint32 qos = 2;
}

// 订阅请求：主题列表为空则返回 INVALID_ARGUMENT。
message SubscribeRequest {
  ConnectionInfo connection = 1;
  repeated TopicFilter topics = 2;
}

// 订阅响应：payload 为 MQTT 原始负载。
message SubscribeResponse {
  string topic = 1;
  bytes payload = 2;
  uint64 recv_time_ms = 3;
}

// 请求并等待响应请求。
message RequestAndWaitRequest {
  ConnectionInfo connection = 1;
  string request_topic = 2;
  string response_topic = 3;
  bytes payload = 4;
  uint32 qos = 5;
  bool retain = 6;
  uint32 timeout_ms = 7;
  uint32 retry_times = 8;
  uint32 retry_interval_ms = 9;
  // 请求标识：仅用于返回/日志，不参与 MQTT 匹配。
  string request_id = 10;
  // JSON 字段匹配路径：用于在响应 payload 中定位匹配字段（如 data.id 或 data.items[0].id）。
  string match_field = 11;
}

// 请求并等待响应响应。
message RequestAndWaitResponse {
  bool ok = 1;
  string message = 2;
  string request_id = 3;
  bytes payload = 4;
  string response_topic = 5;
  uint64 recv_time_ms = 6;
}
