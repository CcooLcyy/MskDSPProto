syntax = "proto3";

package COMMockProto;

message Empty {}

message PortConfig {
  // name：端口名称，用于成对配对。
  string name = 1;
  // dev_path：PTY 从端软链路径。
  string dev_path = 2;
  // peer_name：配对端口名称，必须与对端互相指向。
  string peer_name = 3;
}

message COMMockConfig {
  repeated PortConfig ports = 1;
}

// COMMock 配置服务：用于下发虚拟串口配置并触发全量替换。
service COMMockService {
  // ApplyConfig：非 stream、幂等；清理既有端口并按请求成对重建。
  // 副作用：创建/移除 dev_path 软链、启动/停止 socat 进程。
  // 主要错误码：INVALID_ARGUMENT（字段缺失/非法或配对关系不合法）、FAILED_PRECONDITION（缺少 socat 或无法创建 PTY/软链）。
  rpc ApplyConfig(COMMockConfig) returns (Empty);
}
