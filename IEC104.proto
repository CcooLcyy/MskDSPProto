syntax = "proto3";

package IEC104Proto;

// 空参数
message Empty {}

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_SERVER      = 1;
  ROLE_CLIENT      = 2;
}

enum LinkState {
  LINK_STATE_UNSPECIFIED   = 0;
  LINK_STATE_STOPPED       = 1;
  LINK_STATE_RUNNING       = 2;
  LINK_STATE_PENDING_DELETE = 3;
}

message Endpoint {
  string ip   = 1;
  uint32 port = 2;
}

message APCIParameters {
  // I 帧发送窗口（k）与接收窗口（w）
  uint32 k = 1;
  uint32 w = 2;
  // 定时器：单位秒
  uint32 t0 = 3;
  uint32 t1 = 4;
  uint32 t2 = 5;
  uint32 t3 = 6;
}

message LinkConfig {
  // 由上位机指定的人类可读代称，要求在 IEC104 模块内唯一
  string conn_name = 1;
  Role   role      = 2;

  // SERVER: local 为监听地址；CLIENT: 可选本地绑定地址（留空表示由系统选择）
  Endpoint local  = 3;
  // CLIENT: remote 为对端地址；SERVER: 当前版本忽略（预留用于白名单/绑定）
  Endpoint remote = 4;

  // IEC101/104 参数（后续按需扩展）
  uint32 ca = 5;
  uint32 oa = 6;

  APCIParameters apci = 7;

  // 自发遥测合包窗口（毫秒）；<=0 使用默认值。
  uint32 telemetry_batch_window_ms = 8;
  // 遥测 ASDU 单帧最大字节数（<=249）；0 使用默认值。
  uint32 telemetry_max_asdu_bytes = 9;
  // true: 强制使用 IEC104 标准上限（249 字节），忽略 telemetry_max_asdu_bytes。
  bool telemetry_use_standard_limit = 10;
  // 自发遥测合包去重：默认开启；false 表示不去重（保留同 IOA 多次更新）。
  optional bool telemetry_dedupe = 11;
}

message LinkInfo {
  LinkConfig config = 1;
  // 由 IEC104 向 DataCenter 获取/创建并返回给上位机
  uint32 conn_id = 2;
  LinkState state = 3;
  string last_error = 4;
}

message UpsertLinkRequest {
  LinkConfig config = 1;
  // true: 若已存在则返回 ALREADY_EXISTS；false: 更新/覆盖已有配置
  bool create_only = 2;
}

message GetLinkRequest {
  string conn_name = 1;
}

message DeleteLinkRequest {
  string conn_name = 1;
}

message StartLinkRequest {
  string conn_name = 1;
}

message StopLinkRequest {
  string conn_name = 1;
}

message ListLinksResponse {
  repeated LinkInfo links = 1;
}

enum TelemetryType {
  TELEMETRY_TYPE_UNSPECIFIED = 0;
  // M_ME_NC_1: short float
  TELEMETRY_TYPE_FLOAT       = 1;
}

message TelemetryPoint {
  string        tag    = 1;
  uint32        ioa    = 2;
  TelemetryType type   = 3;
  // 标度与偏移：工程量换算 value = raw * scale + offset（scale=0 视为 1）。
  double scale  = 4;
  double offset = 5;
  // 死区：工程量单位，<=0 表示不过滤。
  double deadband = 6;
}

message UpsertPointTableRequest {
  string conn_name = 1;
  repeated TelemetryPoint points = 2;
  // true: 覆盖更新；false: 增量追加
  bool replace = 3;
}

message GetPointTableRequest {
  string conn_name = 1;
}

message PointTable {
  string conn_name = 1;
  repeated TelemetryPoint points = 2;
}

// IEC104 模块对外 gRPC 服务（控制面）：用于上位机配置链路与点表、以及启停链路。
// 数据面通过 DataCenter 完成转发闭环：Client 收到遥测后 Publish，Server 通过 Subscribe/GetLatest 上送与总召。
service IEC104Service {
  // 创建/更新一条 IEC104 链路配置，并为该链路分配/查询 DataCenter 的 conn_id。
  // - create_only=true：若 conn_name 已存在（本模块或 DataCenter 注册表中）返回 ALREADY_EXISTS。
  // - ROLE_SERVER：会校验 local.port，并进行端口冲突/占用检查；ROLE_CLIENT：会校验 remote.ip/remote.port。
  // - 返回：LinkInfo（包含 conn_id、当前 state、last_error）。
  rpc UpsertLink(UpsertLinkRequest) returns (LinkInfo);
  // 查询单条链路信息（配置 + 运行态）。
  // - 常见错误：NOT_FOUND（conn_name 不存在）、INVALID_ARGUMENT（conn_name 为空）。
  rpc GetLink(GetLinkRequest) returns (LinkInfo);
  // 列出全部链路信息（配置 + 运行态）。
  rpc ListLinks(Empty) returns (ListLinksResponse);
  // 删除一条链路：先停止链路，再请求 DataCenter 删除对应连接（按 (module_name="IEC104", conn_name)）。
  // - 若 DataCenter 删除失败（非 NOT_FOUND），会保留本地配置并标记为 PENDING_DELETE，同时返回错误码。
  // - 幂等：DataCenter 返回 NOT_FOUND 时视为“已删除”，返回 OK。
  rpc DeleteLink(DeleteLinkRequest) returns (Empty);
  // 启动链路的 TCP 监听/连接。
  // - ROLE_SERVER：启动后会订阅 DataCenter（conn_id + 点表 tags），将点值更新转为 IEC104 遥测自发上送。
  // - ROLE_CLIENT：启动后收到遥测会按点表映射为 tag，并 Publish 到 DataCenter。
  // - 常见错误：NOT_FOUND、FAILED_PRECONDITION（已在运行/待删除/配置不允许）。
  rpc StartLink(StartLinkRequest) returns (Empty);
  // 停止链路的 TCP 监听/连接，并停止与 DataCenter 的订阅交互（若有）。
  // - 幂等：重复 StopLink 不会报错（前提是 conn_name 存在）。
  rpc StopLink(StopLinkRequest) returns (Empty);

  // 下发/更新点表（tag <-> IOA 映射）。
  // - replace=true：覆盖更新；false：增量追加/更新（若 tag 与 ioa 冲突返回 ALREADY_EXISTS）。
  // - 约束：仅允许在链路停止状态下更新（运行中返回 FAILED_PRECONDITION）。
  // - 副作用：会将“tags 列表”同步到 DataCenter 的点表（用于路由配置校验/展示）。
  rpc UpsertPointTable(UpsertPointTableRequest) returns (Empty);
  // 获取点表（tag <-> IOA 映射）。
  // - 常见错误：NOT_FOUND（conn_name 不存在）、INVALID_ARGUMENT（conn_name 为空）。
  rpc GetPointTable(GetPointTableRequest) returns (PointTable);
}
