syntax = "proto3";

package ConfigPusherProto;

import "COMMock.proto";
import "DLT645.proto";
import "IEC104.proto";
import "ModbusRTU.proto";
import "AGC.proto";

message Empty {}

message Iec104LinkTask {
  IEC104Proto.UpsertLinkRequest link = 1;
  IEC104Proto.UpsertPointTableRequest point_table = 2;
  bool start = 3;
}

message Iec104Config {
  repeated Iec104LinkTask links = 1;
}

message ModbusRtuLinkTask {
  ModbusRTUProto.UpsertLinkRequest link = 1;
  ModbusRTUProto.UpsertPointTableRequest point_table = 2;
  bool start = 3;
}

message ModbusRtuConfig {
  repeated ModbusRtuLinkTask links = 1;
}

message Dlt645LinkTask {
  DLT645Proto.UpsertLinkRequest link = 1;
  DLT645Proto.UpsertPointTableRequest point_table = 2;
  bool start = 3;
  // 可选：批量设备序号。配置后会按 device_no 展开为多条 DLT645 链路任务。
  // 约束：
  // 1) 仅用于 DLT645PCD；
  // 2) 每项需为 2 位十六进制字符串（例如 01、0A）；
  // 3) link.config.conn_name 建议包含 {device_no} 占位符，未包含时会自动追加后缀 _{device_no}。
  repeated string device_nos = 4;
}

message Dlt645Config {
  DLT645Proto.MqttConfig mqtt = 1;
  repeated Dlt645LinkTask links = 2;
}

// AGC 控制组下发任务
message AgcGroupTask {
  AGCProto.UpsertGroupRequest upsert = 1;
  // true 表示下发配置后调用 StartGroup 启动该控制组内控制环功能
  bool start = 2;
}

// AGC 配置集合
message AgcConfig {
  repeated AgcGroupTask groups = 1;
}

message Config {
  Iec104Config iec104 = 1;
  ModbusRtuConfig modbus_rtu = 2;
  COMMockProto.COMMockConfig com_mock = 3;
  Dlt645Config dlt645 = 4;
  AgcConfig agc = 5;
}

message DataCenterPointTable {
  string module_name = 1;
  string conn_name = 2;
  repeated string tags = 3;
  bool replace = 4;
}

message DataCenterEndpoint {
  string module_name = 1;
  string conn_name = 2;
  string tag = 3;
}

message DataCenterRoute {
  DataCenterEndpoint src = 1;
  DataCenterEndpoint dst = 2;
}

message DataCenterRoutes {
  repeated DataCenterRoute routes = 1;
  bool replace = 2;
}

message DataCenterConfig {
  repeated DataCenterPointTable point_tables = 1;
  DataCenterRoutes routes = 2;
}

// ConfigPusher 服务：用于对外健康探测（当前仅提供 Ping），不包含配置下发 RPC。
service ConfigPusherService {
  // 健康探测：用于检测服务可达，幂等、无副作用；常见错误为 UNAVAILABLE。
  rpc Ping(Empty) returns (Empty);
}
