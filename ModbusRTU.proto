syntax = "proto3";

package ModbusRTUProto;

// 空参数
message Empty {}

// 串口奇偶校验
enum Parity {
  PARITY_UNSPECIFIED = 0;
  PARITY_NONE        = 1;
  PARITY_ODD         = 2;
  PARITY_EVEN        = 3;
}

// 串口停止位
enum StopBits {
  STOP_BITS_UNSPECIFIED = 0;
  STOP_BITS_ONE         = 1;
  STOP_BITS_TWO         = 2;
}

// 传输类型
enum TransportType {
  option allow_alias = true;
  TRANSPORT_UNSPECIFIED = 0;
  TRANSPORT_SERIAL = 1;     // 本地串口直连
  TRANSPORT_MQTT_UART = 2;  // 通过 MQTTManager + uartManager 透传串口
  TRANSPORT_MQTT = 2;       // 兼容简写
}

// 点表地址基准
enum AddressBase {
  ADDRESS_BASE_UNSPECIFIED = 0;
  ADDRESS_BASE_ZERO        = 1;  // 协议偏移（0 基）
  ADDRESS_BASE_ONE         = 2;  // 人类编号（1 基）
}

enum LinkState {
  LINK_STATE_UNSPECIFIED    = 0;
  LINK_STATE_STOPPED        = 1;
  LINK_STATE_RUNNING        = 2;
  LINK_STATE_PENDING_DELETE = 3;
}

// 主站抄读方案
enum ReadPlanMode {
  READ_PLAN_MODE_UNSPECIFIED = 0;
  READ_PLAN_MODE_POINT       = 1;  // 按点逐条抄读（默认）
  READ_PLAN_MODE_EXPLICIT    = 2;  // 按配置区间抄读
}

// 主站显式抄读区间
message ReadBlock {
  // 功能码（目前支持 0x03 读保持寄存器、0x04 读输入寄存器）
  FunctionCode function = 1;
  // 起始地址（遵循 address_base）
  uint32 start = 2;
  // 连续数量（寄存器数量）
  uint32 quantity = 3;
}

// 主站抄读配置
message ReadPlan {
  // 抄读模式：POINT=逐点；EXPLICIT=按区间
  ReadPlanMode mode = 1;
  // 显式区间列表（mode=EXPLICIT 时必填）
  repeated ReadBlock blocks = 2;
}

// 串口配置
message SerialConfig {
  // 设备路径，例如 /dev/ttyUSB0；仅 TRANSPORT_SERIAL 生效。
  string device = 1;
  uint32 baud_rate = 2;
  uint32 data_bits = 3;
  Parity parity = 4;
  StopBits stop_bits = 5;
  // 读超时，单位毫秒（0 表示使用默认值）；仅 TRANSPORT_SERIAL 生效。
  uint32 read_timeout_ms = 6;
}

// MQTT 连接参数（ModbusRTU 模块内部使用）。
message MqttConfig {
  string host = 1;
  uint32 port = 2;
  string client_id = 3;
  string username = 4;
  string password = 5;
  uint32 keepalive_sec = 6;
  bool clean_session = 7;
  uint32 connect_timeout_ms = 8;
}

message LinkConfig {
  // 由上位机指定的人类可读代称，要求在 ModbusRTU 模块内唯一
  string conn_name = 1;
  // 串口参数：
  // - TRANSPORT_SERIAL：表示本地串口 device + 串口参数；
  // - TRANSPORT_MQTT_UART：表示远端 uartManager 串口参数（device 忽略）。
  SerialConfig serial = 2;
  // 目标设备地址（1..247）；轮询与写寄存器均使用该地址。
  uint32 device_id = 3;
  // 轮询周期，单位毫秒（0 表示使用默认值）
  uint32 poll_interval_ms = 4;
  // 点表地址基准（0/1 基）
  AddressBase address_base = 5;
  reserved 6;
  // 抄读方案
  ReadPlan read_plan = 7;
  // 传输类型（默认 TRANSPORT_SERIAL）
  TransportType transport_type = 8;
  // 远端串口标识（TRANSPORT_MQTT_UART 必填，例如 RS485-1）
  string serial_port = 9;
  // 单次请求超时，单位毫秒（TRANSPORT_MQTT_UART；0 表示使用默认值）
  uint32 request_timeout_ms = 10;
  // 字节超时，单位毫秒（TRANSPORT_MQTT_UART，对应 uartManager byteTimeout）
  uint32 serial_byte_timeout_ms = 11;
  // 帧超时，单位毫秒（TRANSPORT_MQTT_UART，对应 uartManager frameTimeout）
  uint32 serial_frame_timeout_ms = 12;
  // 预估最大接收字节（TRANSPORT_MQTT_UART，对应 uartManager estSize）
  uint32 serial_est_size = 13;
}

message LinkInfo {
  LinkConfig config = 1;
  // 由 ModbusRTU 向 DataCenter 获取/创建并返回给上位机
  uint32 conn_id = 2;
  LinkState state = 3;
  string last_error = 4;
}

// ModbusRTU 本地持久化的链路配置。
// 仅保存控制面配置与 conn_id；运行态（总线/线程/last_error）不落盘。
message PersistedLink {
  LinkConfig config = 1;
  uint32 conn_id = 2;
  // true 表示上次删除 DataCenter 失败，重启后仍保持待删除态，阻止模块自动启动或手工启动链路功能。
  bool pending_delete = 3;
}

// ModbusRTU 链路配置集合（用于本地落盘持久化）。
message LinksConfig {
  repeated PersistedLink links = 1;
}

// 更新全局配置（当前用于 MQTT 连接）
message UpdateConfigRequest {
  MqttConfig mqtt = 1;
}

message UpdateConfigResponse {
  bool ok = 1;
  string message = 2;
}

message UpsertLinkRequest {
  LinkConfig config = 1;
  // true: 若已存在则返回 ALREADY_EXISTS；false: 更新/覆盖已有配置
  bool create_only = 2;
}

message GetLinkRequest {
  string conn_name = 1;
}

message DeleteLinkRequest {
  string conn_name = 1;
}

message StartLinkRequest {
  string conn_name = 1;
}

message StopLinkRequest {
  string conn_name = 1;
}

message ListLinksResponse {
  repeated LinkInfo links = 1;
}

enum FunctionCode {
  FUNCTION_UNSPECIFIED = 0;
  FUNCTION_READ_COILS = 1;             // 0x01
  FUNCTION_READ_HOLDING_REGISTERS = 2; // 0x03
  FUNCTION_READ_INPUT_REGISTERS = 3;   // 0x04
  FUNCTION_WRITE_SINGLE_REGISTER = 4;  // 0x06
  FUNCTION_WRITE_MULTIPLE_REGISTERS = 5; // 0x10
}

enum DataType {
  DATA_TYPE_UNSPECIFIED = 0;
  DATA_TYPE_BOOL = 1;
  DATA_TYPE_UINT16 = 2;
  DATA_TYPE_UINT32 = 3;
  DATA_TYPE_INT16 = 4;
  DATA_TYPE_INT32 = 5;
}

// 32 位寄存器字序
enum WordOrder {
  option allow_alias = true;
  WORD_ORDER_UNSPECIFIED = 0;
  WORD_ORDER_HL = 1;  // 高字在前（地址小的寄存器为高字）
  WORD_ORDER_LH = 2;  // 低字在前（地址小的寄存器为低字）
  HL = 1;  // 高字在前（简写）
  LH = 2;  // 低字在前（简写）
}

// 16 位寄存器字节序
enum ByteOrder {
  option allow_alias = true;
  BYTE_ORDER_UNSPECIFIED = 0;
  BYTE_ORDER_AB = 1;  // 高字节在前
  BYTE_ORDER_BA = 2;  // 低字节在前
  AB = 1;  // 高字节在前（简写）
  BA = 2;  // 低字节在前（简写）
}

message Point {
  string tag = 1;
  FunctionCode function = 2;
  uint32 address = 3;
  // 当前 INT16/INT32 仅寄存器功能码支持（0x03/0x04/0x10）。
  // 其中 0x06 仅允许 UINT16/INT16。
  DataType type = 4;
  // 标度与偏移：
  // - 读寄存器：工程量换算 value = raw * scale + offset；
  // - 写寄存器：反向换算 raw = (value - offset) / scale；
  // - scale=0 视为 1。
  double scale = 5;
  double offset = 6;
  reserved 7, 8, 13;
  // 死区：工程量单位，仅对 UINT16/UINT32/INT16/INT32 生效，<=0 表示不过滤。
  double deadband = 9;
  // 寄存器数量（0 表示按 type 默认：UINT16/INT16=1、UINT32/INT32=2；BOOL 忽略）
  uint32 reg_count = 10;
  // 32 位拼接字序（仅对 UINT32/INT32 生效，0 表示 WORD_ORDER_HL）
  WordOrder word_order = 11;
  // 16 位字节序（仅对 UINT16/UINT32/INT16/INT32 生效，0 表示 BYTE_ORDER_AB）
  ByteOrder byte_order = 12;
}

message UpsertPointTableRequest {
  string conn_name = 1;
  repeated Point points = 2;
  // true: 覆盖更新；false: 增量追加
  bool replace = 3;
}

message GetPointTableRequest {
  string conn_name = 1;
}

message PointTable {
  string conn_name = 1;
  repeated Point points = 2;
}

// ModbusRTU 点表配置集合（用于本地落盘持久化）。
message PointTablesConfig {
  repeated PointTable point_tables = 1;
}

// ModbusRTU 模块对外 gRPC 服务（控制面）：用于上位机配置串口链路与点表，以及启停连接功能。
// 数据面通过 DataCenter 完成转发闭环：轮询后 Publish 点值，写点通过 Subscribe 触发写寄存器。
service ModbusRTUService {
  // 更新全局配置（MQTT 连接参数），非幂等，成功后覆盖原配置。
  // - 仅 TRANSPORT_MQTT_UART 链路在启动连接功能时使用。
  // - 若某条已恢复/已下发的链路此前仅因 MQTT 配置未就绪而无法运行，则本 RPC 成功后模块会自动再次尝试启动该链路。
  // - 常见错误：INVALID_ARGUMENT（连接参数为空/不完整）。
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);
  // 创建/更新一条 ModbusRTU 链路配置，并为该链路分配/查询 DataCenter 的 conn_id。
  // - create_only=true：若 conn_name 已存在（本模块或 DataCenter 注册表中）返回 ALREADY_EXISTS。
  // - 校验：
  //   1) TRANSPORT_SERIAL：serial.device 必填；
  //   2) TRANSPORT_MQTT_UART：serial_port 必填；
  //   3) device_id 范围 1..247；同一串口/远端串口若参数不一致会返回 FAILED_PRECONDITION。
  // - 返回：LinkInfo（包含 conn_id、当前 state、last_error）。
  rpc UpsertLink(UpsertLinkRequest) returns (LinkInfo);
  // 查询单条链路信息（配置 + 运行态）。
  // - 常见错误：NOT_FOUND（conn_name 不存在）、INVALID_ARGUMENT（conn_name 为空）。
  rpc GetLink(GetLinkRequest) returns (LinkInfo);
  // 列出全部链路信息（配置 + 运行态）。
  rpc ListLinks(Empty) returns (ListLinksResponse);
  // 删除一条链路：先停止轮询，再请求 DataCenter 删除对应连接（按 (module_name="ModbusRTU", conn_name)）。
  // - 若 DataCenter 删除失败（非 NOT_FOUND），会保留本地配置并标记为 PENDING_DELETE，同时返回错误码。
  // - 幂等：DataCenter 返回 NOT_FOUND 时视为“已删除”，返回 OK。
  rpc DeleteLink(DeleteLinkRequest) returns (Empty);
  // 启动链路连接功能（轮询 + 可选写寄存器订阅）。
  // - TRANSPORT_SERIAL：通过本地串口执行轮询。
  // - TRANSPORT_MQTT_UART：通过 MQTTManager + uartManager 透传 RTU 原始帧。
  // - 当前模块在“链路配置 + 点表 + 必要的 MQTT 配置”达到最小可运行条件后会自动启动；本 RPC 主要作为兼容入口保留。
  // - 幂等：链路已在运行时直接返回 OK。
  // - 常见错误：NOT_FOUND、FAILED_PRECONDITION（待删除/点表未就绪/MQTT 未配置/配置不允许）、UNIMPLEMENTED（暂不支持的传输类型）。
  rpc StartLink(StartLinkRequest) returns (Empty);
  // 停止链路连接功能。
  // - 幂等：重复 StopLink 不会报错（前提是 conn_name 存在）。
  rpc StopLink(StopLinkRequest) returns (Empty);

  // 下发/更新点表（tag <-> address 映射）。
  // - replace=true：覆盖更新；false：增量追加/更新（若 tag 与 address 冲突返回 ALREADY_EXISTS）。
  // - 约束：仅允许在链路停止状态下更新（运行中返回 FAILED_PRECONDITION）。
  // - 副作用：会将“tags 列表”同步到 DataCenter 连接标签注册表（用于路由配置校验/展示）。
  // - 若链路配置、点表以及必要的 MQTT 配置在更新后达到模块当前的最小可运行条件，模块会自动尝试启动该链路。
  rpc UpsertPointTable(UpsertPointTableRequest) returns (Empty);
  // 获取点表（tag <-> address 映射）。
  // - 常见错误：NOT_FOUND（conn_name 不存在）、INVALID_ARGUMENT（conn_name 为空）。
  rpc GetPointTable(GetPointTableRequest) returns (PointTable);
}
