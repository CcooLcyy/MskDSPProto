syntax = "proto3";

package DLT645Proto;

message Empty {}

// 协议变体
enum ProtocolVariant {
  option allow_alias = true;
  PROTOCOL_VARIANT_UNSPECIFIED = 0;
  PROTOCOL_VARIANT_DLT645_STD = 1;
  PROTOCOL_VARIANT_DLT645_PCD = 2;
  DLT645std = 1;
  DLT645PCD = 2;
}

// 传输类型
enum TransportType {
  option allow_alias = true;
  TRANSPORT_UNSPECIFIED = 0;
  TRANSPORT_MQTT = 1;
  TRANSPORT_MQTT_UART = 1;
}

// 通信方式
enum CommMode {
  COMM_MODE_UNSPECIFIED = 0;
  COMM_MODE_CARRIER = 1; // 载波
  COMM_MODE_SERIAL = 2;  // 串口
  COMM_MODE_LORA = 3;    // Lora
}

// 串口奇偶校验
enum SerialParity {
  SERIAL_PARITY_UNSPECIFIED = 0;
  SERIAL_PARITY_NONE = 1;
  SERIAL_PARITY_ODD = 2;
  SERIAL_PARITY_EVEN = 3;
}

// 串口停止位
enum SerialStopBits {
  SERIAL_STOP_BITS_UNSPECIFIED = 0;
  SERIAL_STOP_BITS_ONE = 1;
  SERIAL_STOP_BITS_TWO = 2;
}

// 链路状态
enum LinkState {
  LINK_STATE_UNSPECIFIED = 0;
  LINK_STATE_STOPPED = 1;
  LINK_STATE_RUNNING = 2;
  LINK_STATE_PENDING_DELETE = 3;
}

// 点位数据类型
enum DataType {
  DATA_TYPE_UNSPECIFIED = 0;
  DATA_TYPE_BOOL = 1;
  DATA_TYPE_UINT16 = 2;
  DATA_TYPE_UINT32 = 3;
  DATA_TYPE_FLOAT = 4;
  DATA_TYPE_STRING = 5;
  DATA_TYPE_BCD = 6;
}

// 读写属性
enum AccessMode {
  ACCESS_UNSPECIFIED = 0;
  ACCESS_READ_ONLY = 1;
  ACCESS_WRITE_ONLY = 2;
  ACCESS_READ_WRITE = 3;
}

// MQTT 连接参数（DLT645 模块内部使用）。
message MqttConfig {
  string host = 1;
  uint32 port = 2;
  string client_id = 3;
  string username = 4;
  string password = 5;
  uint32 keepalive_sec = 6;
  bool clean_session = 7;
  uint32 connect_timeout_ms = 8;
}

// 链路配置
message LinkConfig {
  // 由上位机指定的人类可读代称，要求在 DLT645 模块内唯一
  string conn_name = 1;
  ProtocolVariant protocol_variant = 2;
  // 表计地址，PCD 模式下为协议转换器地址
  string meter_addr = 3;
  // PCD 设备序号，使用两位十六进制字符串（例如 0A）
  string device_no = 4;
  TransportType transport_type = 5;
  CommMode comm_mode = 6;
  // 轮询周期，单位毫秒（0 表示使用默认值）
  uint32 poll_interval_ms = 7;
  // 请求超时，单位毫秒（0 表示使用默认值）
  uint32 request_timeout_ms = 8;
  // 串口标识（COMM_MODE_SERIAL 时必填，例如 RS485-1）
  string serial_port = 9;
  // 串口波特率（COMM_MODE_SERIAL，0 使用默认值）
  uint32 serial_baud_rate = 10;
  // 串口数据位（COMM_MODE_SERIAL，0 使用默认值）
  uint32 serial_data_bits = 11;
  // 串口奇偶校验（COMM_MODE_SERIAL，0 使用默认值）
  SerialParity serial_parity = 12;
  // 串口停止位（COMM_MODE_SERIAL，0 使用默认值）
  SerialStopBits serial_stop_bits = 13;
  // 字节超时（COMM_MODE_SERIAL，单位毫秒，0 使用默认值）
  uint32 serial_byte_timeout_ms = 14;
  // 帧超时（COMM_MODE_SERIAL，单位毫秒，0 使用默认值）
  uint32 serial_frame_timeout_ms = 15;
  // 预估最大接收字节（COMM_MODE_SERIAL，0 使用默认值）
  uint32 serial_est_size = 16;
}

message LinkInfo {
  LinkConfig config = 1;
  // 由 DataCenter 分配并返回给上位机
  uint32 conn_id = 2;
  LinkState state = 3;
  string last_error = 4;
}

// 单条链路持久化记录（用于模块本地落盘）
message PersistedLink {
  LinkConfig config = 1;
  uint32 conn_id = 2;
  // true 表示上次删除 DataCenter 失败，重启后仍保持待删除态，阻止重新启动连接功能。
  bool pending_delete = 3;
}

// 链路配置集合（用于落盘持久化）
message LinksConfig {
  repeated PersistedLink links = 1;
}

// 更新全局配置（当前用于 MQTT 连接）
message UpdateConfigRequest {
  MqttConfig mqtt = 1;
}

message UpdateConfigResponse {
  bool ok = 1;
  string message = 2;
}

message UpsertLinkRequest {
  LinkConfig config = 1;
  // true: 若已存在则返回 ALREADY_EXISTS；false: 更新/覆盖已有配置
  bool create_only = 2;
}

message GetLinkRequest {
  string conn_name = 1;
}

message DeleteLinkRequest {
  string conn_name = 1;
}

message StartLinkRequest {
  string conn_name = 1;
}

message StopLinkRequest {
  string conn_name = 1;
}

message ListLinksResponse {
  repeated LinkInfo links = 1;
}

// 点位定义
message Point {
  string tag = 1;
  // 4 字节数据标识，8 位十六进制字符串；配置为高字节在前。
  // 模块发送时按字节逆序；PCD 会在 DI 后追加 device_no。
  string di = 2;
  // 数据域字节数（不含 DI 与设备序号）
  uint32 data_len = 3;
  DataType type = 4;
  AccessMode access = 5;
  // 标度与偏移：工程量换算 value = raw * scale + offset（scale=0 视为 1）
  double scale = 6;
  double offset = 7;
  // 死区：工程量单位，<=0 表示不过滤
  double deadband = 8;
}

// 数据块子项定义（按表格顺序拼接，不包含 DI）
message BlockItem {
  string tag = 1;
  // 数据域字节数
  uint32 data_len = 2;
  DataType type = 3;
  AccessMode access = 4;
  // 标度与偏移：工程量换算 value = raw * scale + offset（scale=0 视为 1）
  double scale = 5;
  double offset = 6;
  // 死区：工程量单位，<=0 表示不过滤
  double deadband = 7;
  // ASCII 字段右侧空格裁剪（未设置时默认裁剪）
  optional bool trim_right_space = 8;
}

// 数据块定义（一个 DI 对应多个子项）
message Block {
  // 数据块 DI，8 位十六进制字符串；配置为高字节在前。
  // 模块发送时按字节逆序；PCD 会在 DI 后追加 device_no。
  string block_di = 1;
  // 数据域总字节数（不含 DI 与设备序号）
  uint32 block_data_len = 2;
  repeated BlockItem items = 3;
}

message UpsertPointTableRequest {
  string conn_name = 1;
  repeated Point points = 2;
  // true: 覆盖更新；false: 增量追加
  bool replace = 3;
  // 数据块定义：读请求按数据块 DI 发送，响应按 items 顺序拆分发布
  repeated Block blocks = 4;
}

message GetPointTableRequest {
  string conn_name = 1;
}

message PointTable {
  string conn_name = 1;
  repeated Point points = 2;
  repeated Block blocks = 3;
}

// 点表配置集合（用于落盘持久化）
message PointTablesConfig {
  repeated PointTable point_tables = 1;
}

// DLT645 模块对外 gRPC 服务（控制面）：用于上位机配置链路与点表、以及启停通信任务。
service DLT645Service {
  // 更新全局配置（MQTT 连接参数），非幂等，成功后覆盖原配置。
  // 常见错误：INVALID_ARGUMENT（连接参数非法）。
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);
  // 创建/更新一条 DLT645 链路配置，并为该链路分配/查询 DataCenter 的 conn_id。
  // - create_only=true：若 conn_name 已存在（本模块或 DataCenter 注册表中）返回 ALREADY_EXISTS。
  // - create_only=false：仅允许更新已停止链路；若链路处于 RUNNING/PENDING_DELETE 返回 FAILED_PRECONDITION。
  // - 更新已有链路时保留原 conn_id 与点表，只覆盖链路配置。
  // - 常见错误：INVALID_ARGUMENT（字段缺失/串口模式未提供 serial_port）。
  rpc UpsertLink(UpsertLinkRequest) returns (LinkInfo);
  // 查询单条链路信息（配置 + 运行态）。
  // 常见错误：NOT_FOUND（conn_name 不存在）、INVALID_ARGUMENT（conn_name 为空）。
  rpc GetLink(GetLinkRequest) returns (LinkInfo);
  // 列出全部链路信息（配置 + 运行态）。
  rpc ListLinks(Empty) returns (ListLinksResponse);
  // 删除一条链路：先停止通信，再请求 DataCenter 删除对应连接。
  // - 若 DataCenter 删除失败（非 NOT_FOUND），会保留本地配置并标记为 PENDING_DELETE，同时返回错误码。
  // 幂等：DataCenter 返回 NOT_FOUND 时视为已删除。
  rpc DeleteLink(DeleteLinkRequest) returns (Empty);
  // 启动链路通信任务（点表轮询 + 写入订阅）。
  rpc StartLink(StartLinkRequest) returns (Empty);
  // 停止链路通信任务。
  rpc StopLink(StopLinkRequest) returns (Empty);
  // 下发/更新点表（tag <-> di 映射）。
  // - replace=true：覆盖更新；false：增量追加（若 tag/di 冲突返回 ALREADY_EXISTS）。
  // - 数据块：按 block_di 读整块，再按 items 顺序拆分发布。
  // - 约束：仅允许在链路停止状态下更新（运行中返回 FAILED_PRECONDITION）。
  rpc UpsertPointTable(UpsertPointTableRequest) returns (Empty);
  // 获取点表（tag <-> di 映射）。
  // 常见错误：NOT_FOUND（conn_name 不存在）、INVALID_ARGUMENT（conn_name 为空）。
  rpc GetPointTable(GetPointTableRequest) returns (PointTable);
}
